<style>

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background-color: #fffffff0; /* White background for header */
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Light shadow for depth */
    position: sticky;
    top:0px;
    width: 100%;
  }
  
  .logo {
    font-size: 24px;
    font-weight: bold;
    color: #333333; /* Charcoal Black */
  }
  
  nav ul {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  
  nav ul li {
    margin: 0 15px; /* Space between menu items */
  }
  
  nav ul li a {
    text-decoration: none;
    color: #333333; /* Charcoal Black */
    font-weight: 500;
    transition: color 0.3s; /* Smooth transition for hover effect */
  }
  
  nav ul li a:hover {
    color: #FF7043; /* Burnt Orange for hover effect */
  }
  
  .search-bar {
    display: flex;
    align-items: center;
  }
  
  .search-bar input {
    padding: 10px;
    border: 1px solid #E0E0E0; /* Soft border */
    border-radius: 5px;
    margin-right: 10px; /* Space between input and button */
  }
  
  .search-bar button {
    background-color: #FF7043; /* Burnt Orange */
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s; /* Smooth transition for hover */
  }
  
  .search-bar button:hover {
    background-color: #D84315; /* Darker shade for hover */
  }
  .cart-icon a {
    text-decoration: none;
    color: #333333; /* Charcoal Black */

    font-size: 30px;
  }

 header nav a:hover {

.dropdown-menu {

}

  padding: 12px 20px;

}

}
